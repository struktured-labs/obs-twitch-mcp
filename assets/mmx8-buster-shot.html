<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 900px;
    height: 500px;
    overflow: hidden;
    position: relative;
  }

  .megaman-container {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 500px;
    height: 100%;
  }

  .megaman-img {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) scaleX(-1);
    height: 90%;
    image-rendering: pixelated;
  }

  /* Buster glow on the barrel - LEFT side of character */
  .buster-glow {
    position: absolute;
    top: 28%;
    left: 2%;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,220,255,0.9), rgba(0,100,255,0.4), transparent);
    animation: busterCharge 4s ease-in-out infinite;
    filter: blur(2px);
    z-index: 10;
  }

  @keyframes busterCharge {
    0% { opacity: 0; transform: scale(0.3); }
    50% { opacity: 0.3; transform: scale(0.5); }
    70% { opacity: 0.8; transform: scale(1.2); }
    75% { opacity: 1; transform: scale(1.8); filter: blur(5px); }
    78% { opacity: 0.2; transform: scale(0.5); }
    100% { opacity: 0; transform: scale(0.3); }
  }

  /* Plasma shot projectile - fires LEFT */
  .plasma-shot {
    position: absolute;
    top: 27%;
    left: 2%;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff, #00ccff, #0066ff);
    box-shadow:
      0 0 12px #00ccff,
      0 0 24px #0088ff,
      0 0 48px rgba(0,136,255,0.5);
    opacity: 0;
    animation: fireShot 4s ease-out infinite;
    z-index: 10;
  }

  @keyframes fireShot {
    0%, 74% { opacity: 0; transform: translateX(0) scale(0.5); }
    76% { opacity: 1; transform: translateX(0) scale(1.3); }
    78% { opacity: 1; transform: translateX(-20px) scale(1); }
    88% { opacity: 0.8; transform: translateX(-300px) scale(0.9); }
    96% { opacity: 0.3; transform: translateX(-600px) scale(0.7); }
    100% { opacity: 0; transform: translateX(-800px) scale(0.5); }
  }

  /* Trail behind the shot - going LEFT */
  .plasma-trail {
    position: absolute;
    top: 29%;
    left: 2%;
    width: 0;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(to right, rgba(0,204,255,0.8), transparent);
    opacity: 0;
    animation: trailAnim 4s ease-out infinite;
    z-index: 9;
  }

  @keyframes trailAnim {
    0%, 76% { opacity: 0; transform: translateX(0); width: 0; }
    78% { opacity: 0.9; transform: translateX(-10px); width: 50px; }
    88% { opacity: 0.5; transform: translateX(-280px); width: 100px; }
    96% { opacity: 0.2; transform: translateX(-580px); width: 50px; }
    100% { opacity: 0; transform: translateX(-800px); width: 20px; }
  }

  /* Muzzle flash at buster tip */
  .muzzle-flash {
    position: absolute;
    top: 23%;
    left: -2%;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(0,220,255,0.6), transparent);
    opacity: 0;
    animation: muzzleFlash 4s ease-out infinite;
    z-index: 11;
  }

  @keyframes muzzleFlash {
    0%, 74% { opacity: 0; transform: scale(0); }
    75% { opacity: 1; transform: scale(1.5); }
    78% { opacity: 0.5; transform: scale(2); }
    82% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 0; }
  }

  /* Charge spark particles */
  .charge-spark {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #00ccff;
    box-shadow: 0 0 6px #00ccff;
    opacity: 0;
  }
</style>
</head>
<body>

<div class="megaman-container">
  <img class="megaman-img" src="file:///home/struktured/Pictures/megmanx8.png" />
  <div class="buster-glow"></div>
  <div class="muzzle-flash"></div>
  <div class="plasma-shot"></div>
  <div class="plasma-trail"></div>
</div>

<script>
// Charge spark particles that converge toward buster before each shot
const busterX = 10;
const busterY = 140;

for (let i = 0; i < 14; i++) {
  const spark = document.createElement('div');
  spark.className = 'charge-spark';

  const angle = (Math.PI * 2 / 14) * i;
  const radius = 50 + Math.random() * 50;
  const startX = busterX + Math.cos(angle) * radius;
  const startY = busterY + Math.sin(angle) * radius;

  const style = document.createElement('style');
  style.textContent = `
    @keyframes sparkConverge${i} {
      0% { opacity: 0; left: ${startX}px; top: ${startY}px; transform: scale(1); }
      10% { opacity: 0.7; }
      65% { opacity: 1; left: ${busterX}px; top: ${busterY}px; transform: scale(0.3); }
      70%, 100% { opacity: 0; left: ${busterX}px; top: ${busterY}px; transform: scale(0); }
    }
  `;
  document.head.appendChild(style);

  spark.style.animation = `sparkConverge${i} 4s ease-in infinite`;
  spark.style.animationDelay = (Math.random() * 2) + 's';
  document.querySelector('.megaman-container').appendChild(spark);
}
</script>

</body>
</html>
