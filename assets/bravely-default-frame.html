<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Cinzel', serif;
  }

  /* Border frame - Bravely Default crystal/gold theme */
  .frame {
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 3px solid #c9a84c;
    box-shadow:
      inset 0 0 0 2px transparent,
      inset 0 0 0 5px rgba(201,168,76,0.4),
      0 0 25px rgba(201,168,76,0.2),
      0 0 50px rgba(255,215,100,0.08);
    animation: framePulse 4s ease-in-out infinite;
  }

  @keyframes framePulse {
    0%, 100% { box-shadow: inset 0 0 0 2px transparent, inset 0 0 0 5px rgba(201,168,76,0.4), 0 0 25px rgba(201,168,76,0.2); }
    50% { box-shadow: inset 0 0 0 2px transparent, inset 0 0 0 5px rgba(230,200,100,0.6), 0 0 40px rgba(201,168,76,0.35), 0 0 60px rgba(255,215,100,0.15); }
  }

  /* Corner ornaments */
  .corner-ornament {
    position: absolute;
    width: 30px; height: 30px;
    z-index: 10;
  }

  .corner-ornament::before, .corner-ornament::after {
    content: '';
    position: absolute;
    background: #c9a84c;
  }

  .corner-tl { top: 5px; left: 5px; }
  .corner-tl::before { top: 0; left: 0; width: 20px; height: 3px; }
  .corner-tl::after { top: 0; left: 0; width: 3px; height: 20px; }

  .corner-tr { top: 5px; right: 5px; }
  .corner-tr::before { top: 0; right: 0; width: 20px; height: 3px; }
  .corner-tr::after { top: 0; right: 0; width: 3px; height: 20px; }

  .corner-bl { bottom: 5px; left: 5px; }
  .corner-bl::before { bottom: 0; left: 0; width: 20px; height: 3px; }
  .corner-bl::after { bottom: 0; left: 0; width: 3px; height: 20px; }

  .corner-br { bottom: 5px; right: 5px; }
  .corner-br::before { bottom: 0; right: 0; width: 20px; height: 3px; }
  .corner-br::after { bottom: 0; right: 0; width: 3px; height: 20px; }

  /* Top banner */
  .top-banner {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    background: rgba(10,8,20,0.85);
    border: 2px solid #c9a84c;
    padding: 10px 40px;
  }

  .game-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: #e8d08c;
    letter-spacing: 4px;
    text-shadow: 0 0 12px rgba(201,168,76,0.5), 0 2px 4px rgba(0,0,0,0.5);
  }

  .game-subtitle {
    font-size: 10px;
    color: #8a7a5a;
    letter-spacing: 6px;
    margin-top: 4px;
  }

  /* Bottom info bar */
  .bottom-bar {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .info-chip {
    font-size: 9px;
    padding: 6px 14px;
    border: 1px solid;
    background: rgba(10,8,20,0.8);
    letter-spacing: 2px;
    animation: chipGlow 3s ease-in-out infinite;
  }

  .info-chip:nth-child(1) { color: #e8d08c; border-color: #c9a84c; animation-delay: 0s; }
  .info-chip:nth-child(2) { color: #8ec5e8; border-color: #5a9cc5; animation-delay: 0.4s; }
  .info-chip:nth-child(3) { color: #c5e88e; border-color: #8ab85a; animation-delay: 0.8s; }

  @keyframes chipGlow {
    0%, 100% { opacity: 0.65; }
    50% { opacity: 1; }
  }

  /* Crystal particles */
  .crystal-particle {
    position: absolute;
    width: 4px;
    height: 4px;
    animation: crystalFloat 6s ease-in-out infinite;
    opacity: 0;
  }

  @keyframes crystalFloat {
    0% { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.3); }
    20% { opacity: 0.7; }
    80% { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(-100px) rotate(180deg) scale(0.8); }
  }

  .brand {
    position: absolute;
    bottom: 48px;
    right: 28px;
    font-size: 8px;
    color: #4a4030;
    letter-spacing: 2px;
    z-index: 10;
  }

  .brand a { color: #8a7a5a; text-decoration: none; }
</style>
</head>
<body>

<div class="frame"></div>
<div class="corner-ornament corner-tl"></div>
<div class="corner-ornament corner-tr"></div>
<div class="corner-ornament corner-bl"></div>
<div class="corner-ornament corner-br"></div>

<div class="top-banner">
  <div class="game-title">BRAVELY DEFAULT</div>
  <div class="game-subtitle">FLYING FAIRY HD REMASTER // MODDED</div>
</div>

<div class="bottom-bar">
  <div class="info-chip">STEAM HD // MODDED</div>
  <div class="info-chip">LIVE // STRUKTURED</div>
  <div class="info-chip">CLAUDE CODE AI</div>
</div>

<script>
// Crystal particles along frame edges
const colors = ['#e8d08c', '#c9a84c', '#fff5cc', '#a8c8e8', '#d4a8e8'];
for (let i = 0; i < 35; i++) {
  const p = document.createElement('div');
  p.className = 'crystal-particle';
  const color = colors[Math.floor(Math.random() * colors.length)];

  // Diamond shape
  p.style.background = color;
  p.style.boxShadow = '0 0 8px ' + color;
  p.style.transform = 'rotate(45deg)';

  const edge = Math.floor(Math.random() * 4);
  if (edge === 0) { p.style.left = Math.random() * 100 + '%'; p.style.bottom = '12px'; }
  else if (edge === 1) { p.style.left = Math.random() * 100 + '%'; p.style.top = '12px'; }
  else if (edge === 2) { p.style.top = Math.random() * 100 + '%'; p.style.left = '12px'; }
  else { p.style.top = Math.random() * 100 + '%'; p.style.right = '12px'; }

  p.style.animationDelay = Math.random() * 6 + 's';
  p.style.animationDuration = (4 + Math.random() * 4) + 's';
  document.body.appendChild(p);
}
</script>

<div class="brand">
  BUILT WITH CLAUDE CODE // <a href="https://github.com/struktured-labs/obs-twitch-mcp">OBS-TWITCH-MCP</a>
</div>

</body>
</html>
