<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 1431px;
    height: 810px;
    overflow: hidden;
    font-family: 'Cinzel', serif;
  }

  .game-frame {
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border: 3px solid #c9a84c;
    box-shadow:
      inset 0 0 0 2px rgba(10,8,20,0.8),
      inset 0 0 0 5px rgba(201,168,76,0.3),
      0 0 18px rgba(201,168,76,0.3),
      0 0 35px rgba(255,215,100,0.1);
    animation: framePulse 4s ease-in-out infinite;
  }

  @keyframes framePulse {
    0%, 100% {
      box-shadow:
        inset 0 0 0 2px rgba(10,8,20,0.8),
        inset 0 0 0 5px rgba(201,168,76,0.3),
        0 0 18px rgba(201,168,76,0.3),
        0 0 35px rgba(255,215,100,0.1);
    }
    50% {
      box-shadow:
        inset 0 0 0 2px rgba(10,8,20,0.8),
        inset 0 0 0 5px rgba(230,200,100,0.5),
        0 0 30px rgba(201,168,76,0.45),
        0 0 55px rgba(255,215,100,0.2);
    }
  }

  /* Corner ornaments */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    z-index: 5;
  }

  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: #c9a84c;
  }

  .corner-tl { top: -2px; left: -2px; }
  .corner-tl::before { top: 0; left: 0; width: 14px; height: 2px; }
  .corner-tl::after { top: 0; left: 0; width: 2px; height: 14px; }

  .corner-tr { top: -2px; right: -2px; }
  .corner-tr::before { top: 0; right: 0; width: 14px; height: 2px; }
  .corner-tr::after { top: 0; right: 0; width: 2px; height: 14px; }

  .corner-bl { bottom: -2px; left: -2px; }
  .corner-bl::before { bottom: 0; left: 0; width: 14px; height: 2px; }
  .corner-bl::after { bottom: 0; left: 0; width: 2px; height: 14px; }

  .corner-br { bottom: -2px; right: -2px; }
  .corner-br::before { bottom: 0; right: 0; width: 14px; height: 2px; }
  .corner-br::after { bottom: 0; right: 0; width: 2px; height: 14px; }

  /* HUD labels */
  .hud-label {
    position: absolute;
    top: -1px;
    left: 30px;
    background: rgba(10,8,20,0.9);
    border: 2px solid #c9a84c;
    border-top: none;
    padding: 3px 14px;
    z-index: 5;
  }

  .hud-text {
    font-size: 8px;
    color: #e8d08c;
    letter-spacing: 3px;
    text-shadow: 0 0 6px rgba(201,168,76,0.4);
  }

  .stage-label {
    position: absolute;
    bottom: -1px;
    right: 30px;
    background: rgba(10,8,20,0.9);
    border: 2px solid #c9a84c;
    border-bottom: none;
    padding: 3px 14px;
    z-index: 5;
  }

  .stage-text {
    font-size: 8px;
    color: #8a7a5a;
    letter-spacing: 3px;
  }

  /* Crystal ticks */
  .tick {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #e8d08c;
    transform: rotate(45deg);
    box-shadow: 0 0 6px rgba(232,208,140,0.4);
    animation: tickPulse 3s ease-in-out infinite;
  }

  .tick.left { left: -5px; }
  .tick.right { right: -5px; }

  @keyframes tickPulse {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1; }
  }

  /* Crystal particles */
  .crystal {
    position: absolute;
    width: 3px;
    height: 3px;
    animation: crystalDrift 6s ease-in-out infinite;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes crystalDrift {
    0% { opacity: 0; transform: translate(0, 0) rotate(0deg) scale(0.4); }
    25% { opacity: 0.6; }
    75% { opacity: 0.6; }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(180deg) scale(1); }
  }
</style>
</head>
<body>

<div class="game-frame">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="hud-label">
    <span class="hud-text">GAME CAPTURE</span>
  </div>

  <div class="stage-label">
    <span class="stage-text">HD REMASTER // MODDED</span>
  </div>
</div>

<script>
const frame = document.querySelector('.game-frame');

// Crystal ticks along edges
for (let i = 0; i < 10; i++) {
  const tickL = document.createElement('div');
  tickL.className = 'tick left';
  tickL.style.top = (50 + i * 72) + 'px';
  tickL.style.animationDelay = (i * 0.15) + 's';
  frame.appendChild(tickL);

  const tickR = document.createElement('div');
  tickR.className = 'tick right';
  tickR.style.top = (50 + i * 72) + 'px';
  tickR.style.animationDelay = (i * 0.15 + 0.5) + 's';
  frame.appendChild(tickR);
}

// Crystal particles
const colors = ['#e8d08c', '#c9a84c', '#fff5cc', '#a8c8e8'];
for (let i = 0; i < 25; i++) {
  const p = document.createElement('div');
  p.className = 'crystal';
  const c = colors[Math.floor(Math.random() * colors.length)];
  p.style.background = c;
  p.style.boxShadow = '0 0 6px ' + c;
  p.style.borderRadius = '0';
  p.style.transform = 'rotate(45deg)';

  const edge = Math.floor(Math.random() * 4);
  if (edge === 0) { p.style.left = (20 + Math.random() * 1390) + 'px'; p.style.top = '6px'; p.style.setProperty('--dx', '0px'); p.style.setProperty('--dy', '-20px'); }
  else if (edge === 1) { p.style.left = (20 + Math.random() * 1390) + 'px'; p.style.bottom = '6px'; p.style.setProperty('--dx', '0px'); p.style.setProperty('--dy', '20px'); }
  else if (edge === 2) { p.style.top = (20 + Math.random() * 770) + 'px'; p.style.left = '6px'; p.style.setProperty('--dx', '-20px'); p.style.setProperty('--dy', '0px'); }
  else { p.style.top = (20 + Math.random() * 770) + 'px'; p.style.right = '6px'; p.style.setProperty('--dx', '20px'); p.style.setProperty('--dy', '0px'); }

  p.style.animationDelay = (Math.random() * 6) + 's';
  p.style.animationDuration = (4 + Math.random() * 4) + 's';
  document.body.appendChild(p);
}
</script>

</body>
</html>
