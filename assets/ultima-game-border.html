<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 1431px;
    height: 810px;
    overflow: hidden;
    font-family: 'MedievalSharp', cursive;
  }

  .game-frame {
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border: 3px solid #5a4a3a;
    box-shadow:
      inset 0 0 0 2px #1a140e,
      inset 0 0 0 5px #d4a524,
      0 0 15px rgba(212,165,36,0.35),
      0 0 30px rgba(180,120,20,0.15);
    animation: framePulse 4s ease-in-out infinite;
  }

  @keyframes framePulse {
    0%, 100% {
      box-shadow:
        inset 0 0 0 2px #1a140e,
        inset 0 0 0 5px #d4a524,
        0 0 15px rgba(212,165,36,0.35),
        0 0 30px rgba(180,120,20,0.15);
    }
    50% {
      box-shadow:
        inset 0 0 0 2px #1a140e,
        inset 0 0 0 5px #f0c040,
        0 0 25px rgba(240,192,64,0.5),
        0 0 50px rgba(212,165,36,0.25);
    }
  }

  /* Ankh corner decorations */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #d4a524;
    text-shadow: 0 0 6px rgba(212,165,36,0.6);
    z-index: 5;
  }

  .corner-tl { top: -8px; left: -8px; }
  .corner-tr { top: -8px; right: -8px; }
  .corner-bl { bottom: -8px; left: -8px; }
  .corner-br { bottom: -8px; right: -8px; }

  /* Rune ticks along edges */
  .rune-tick {
    position: absolute;
    font-size: 10px;
    color: #c4a882;
    text-shadow: 0 0 4px rgba(196,168,130,0.5);
    animation: runePulse 2.5s ease-in-out infinite;
  }

  .rune-tick.left { left: -6px; }
  .rune-tick.right { right: -6px; }

  @keyframes runePulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Top-left HUD label */
  .hud-label {
    position: absolute;
    top: -1px;
    left: 30px;
    background: #1a140e;
    border: 2px solid #d4a524;
    border-top: none;
    padding: 3px 12px;
    z-index: 5;
  }

  .hud-text {
    font-size: 11px;
    color: #d4a524;
    letter-spacing: 2px;
    text-shadow: 0 0 6px rgba(212,165,36,0.4);
  }

  /* Bottom-right stage label */
  .stage-label {
    position: absolute;
    bottom: -1px;
    right: 30px;
    background: #1a140e;
    border: 2px solid #d4a524;
    border-bottom: none;
    padding: 3px 12px;
    z-index: 5;
  }

  .stage-text {
    font-size: 11px;
    color: #c4a882;
    letter-spacing: 2px;
  }

  /* Ember particles drifting upward */
  .ember {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    animation: emberDrift 5s ease-in-out infinite;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes emberDrift {
    0% { opacity: 0; transform: translate(0, 0) scale(0.5); }
    25% { opacity: 0.7; }
    75% { opacity: 0.5; }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.2); }
  }
</style>
</head>
<body>

<div class="game-frame">
  <div class="corner corner-tl">&#9765;</div>
  <div class="corner corner-tr">&#9765;</div>
  <div class="corner corner-bl">&#9765;</div>
  <div class="corner corner-br">&#9765;</div>

  <div class="hud-label">
    <span class="hud-text">GAME CAPTURE</span>
  </div>

  <div class="stage-label">
    <span class="stage-text">RUNES OF VIRTUE</span>
  </div>
</div>

<script>
const frame = document.querySelector('.game-frame');
const runes = ['\u16B1', '\u16B2', '\u16BE', '\u16D6', '\u16A0', '\u16C1'];

// Rune ticks along left and right edges
for (let i = 0; i < 12; i++) {
  const runeL = document.createElement('div');
  runeL.className = 'rune-tick left';
  runeL.textContent = runes[i % runes.length];
  runeL.style.top = (40 + i * 62) + 'px';
  runeL.style.animationDelay = (i * 0.12) + 's';
  frame.appendChild(runeL);

  const runeR = document.createElement('div');
  runeR.className = 'rune-tick right';
  runeR.textContent = runes[(i + 3) % runes.length];
  runeR.style.top = (40 + i * 62) + 'px';
  runeR.style.animationDelay = (i * 0.12 + 0.5) + 's';
  frame.appendChild(runeR);
}

// Ember particles drifting upward along borders
const emberColors = ['#d4a524', '#ff9944', '#f0c040', '#c4a882'];
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'ember';
  const c = emberColors[Math.floor(Math.random() * emberColors.length)];
  p.style.background = c;
  p.style.boxShadow = '0 0 5px ' + c;

  // Place along edges - embers drift upward
  const edge = Math.floor(Math.random() * 4);
  if (edge === 0) {
    p.style.left = (20 + Math.random() * 1390) + 'px';
    p.style.top = '6px';
    p.style.setProperty('--dx', (Math.random() * 20 - 10) + 'px');
    p.style.setProperty('--dy', '-30px');
  } else if (edge === 1) {
    p.style.left = (20 + Math.random() * 1390) + 'px';
    p.style.bottom = '6px';
    p.style.setProperty('--dx', (Math.random() * 20 - 10) + 'px');
    p.style.setProperty('--dy', '-40px');
  } else if (edge === 2) {
    p.style.top = (20 + Math.random() * 770) + 'px';
    p.style.left = '6px';
    p.style.setProperty('--dx', '-10px');
    p.style.setProperty('--dy', '-30px');
  } else {
    p.style.top = (20 + Math.random() * 770) + 'px';
    p.style.right = '6px';
    p.style.setProperty('--dx', '10px');
    p.style.setProperty('--dy', '-30px');
  }

  p.style.animationDelay = (Math.random() * 5) + 's';
  p.style.animationDuration = (3 + Math.random() * 4) + 's';
  document.body.appendChild(p);
}
</script>

</body>
</html>
