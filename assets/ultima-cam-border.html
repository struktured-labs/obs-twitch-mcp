<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 620px;
    height: 470px;
    overflow: hidden;
    font-family: 'MedievalSharp', cursive;
  }

  .cam-frame {
    position: absolute;
    top: 5px; left: 5px; right: 5px; bottom: 30px;
    border: 4px solid #5a4a3a;
    box-shadow:
      inset 0 0 0 2px #1a140e,
      inset 0 0 0 5px #d4a524,
      0 0 12px rgba(212,165,36,0.4);
    animation: camPulse 3s ease-in-out infinite;
  }

  /* Ankh corner decorations */
  .cam-frame::before, .cam-frame::after {
    content: '\2625';
    position: absolute;
    width: 16px; height: 16px;
    font-size: 14px;
    color: #d4a524;
    text-shadow: 0 0 5px rgba(212,165,36,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cam-frame::before { top: -8px; left: -8px; }
  .cam-frame::after { top: -8px; right: -8px; }

  .corner-bl, .corner-br {
    position: absolute;
    width: 16px; height: 16px;
    font-size: 14px;
    color: #d4a524;
    text-shadow: 0 0 5px rgba(212,165,36,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .corner-bl { bottom: 28px; left: -2px; }
  .corner-br { bottom: 28px; right: -2px; }

  @keyframes camPulse {
    0%, 100% { box-shadow: inset 0 0 0 2px #1a140e, inset 0 0 0 5px #d4a524, 0 0 12px rgba(212,165,36,0.4); }
    50% { box-shadow: inset 0 0 0 2px #1a140e, inset 0 0 0 5px #f0c040, 0 0 20px rgba(240,192,64,0.6); }
  }

  /* Name tag bar at bottom */
  .name-bar {
    position: absolute;
    bottom: 2px;
    left: 5px; right: 5px;
    height: 26px;
    background: linear-gradient(90deg, #1a140e, #3a2a1a, #1a140e);
    border: 2px solid #d4a524;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .name-text {
    font-size: 14px;
    color: #d4a524;
    letter-spacing: 4px;
    text-shadow: 0 0 8px rgba(212,165,36,0.5);
  }

  /* Rune ticks on left edge */
  .rune-tick {
    position: absolute;
    left: -4px;
    font-size: 9px;
    color: #c4a882;
    text-shadow: 0 0 4px rgba(196,168,130,0.6);
    animation: tickPulse 2s ease-in-out infinite;
  }

  @keyframes tickPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="cam-frame">
  <div class="corner-bl">&#9765;</div>
  <div class="corner-br">&#9765;</div>
</div>

<div class="name-bar">
  <span class="name-text">STRUKTURED</span>
</div>

<script>
const runes = ['\u16B1', '\u16B2', '\u16BE', '\u16D6', '\u16A0', '\u16C1', '\u16B3', '\u16DA'];

// Rune ticks along left edge of frame
for (let i = 0; i < 8; i++) {
  const tick = document.createElement('div');
  tick.className = 'rune-tick';
  tick.textContent = runes[i % runes.length];
  tick.style.top = (40 + i * 50) + 'px';
  tick.style.animationDelay = (i * 0.15) + 's';
  document.querySelector('.cam-frame').appendChild(tick);
}
</script>

</body>
</html>
